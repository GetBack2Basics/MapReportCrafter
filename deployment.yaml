apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: default
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        sendfile on;
        keepalive_timeout 65;

        server {
            listen 80;
            server_name localhost;

            location / {
                proxy_pass http://pg-tileserv-service:7800;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy
  namespace: default
  labels:
    app: nginx-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-proxy
  template:
    metadata:
      labels:
        app: nginx-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: config
        configMap:
          name: nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy-service
  namespace: default
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
  selector:
    app: nginx-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgis
  namespace: default
  labels:
    app: postgis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgis
  template:
    metadata:
      labels:
        app: postgis
    spec:
      containers:
      - name: postgis
        image: kartoza/postgis:16-3.4
        env:
        - name: POSTGRES_DB
          value: gis
        - name: POSTGRES_USER
          value: docker
        - name: POSTGRES_PASS
          value: docker
        - name: POSTGRES_PASSWORD
          value: docker
        - name: ALLOW_IP_RANGE
          value: 0.0.0.0/0
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgis-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qgis-server
  namespace: default
  labels:
    app: qgis-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qgis-server
  template:
    metadata:
      labels:
        app: qgis-server
    spec:
      containers:
      - name: qgis-server
        image: qgis/qgis-server:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: fungis-volume
          mountPath: /data
      volumes:
      - name: fungis-volume
        hostPath:
          path: /home/ubuntu/fungis-app
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: qgis-server-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: qgis-server
